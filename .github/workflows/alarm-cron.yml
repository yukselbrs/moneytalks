name: Alarm Cron Job

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-alarms:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Alarm kontrolü
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://www.parakonusur.com/api/cron/alarmlar" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 60)
          echo "HTTP Status: $response"
          if [ "$response" != "200" ]; then
            echo "Hata: $response"
            exit 1
          fi
